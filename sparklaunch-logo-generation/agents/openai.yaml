interface:
  display_name: "SparkLaunch Logo Generation"
  short_description: "Generate logos via MCP server"
  default_prompt: >
    Use $sparklaunch-logo-generation against https://sparklaun.ch/api/mcp/server/.
    Authentication is API-key-first: use or request an MCP API key, and do not
    send login instructions when an API key path exists. Use crm.generate_logo
    with logos.write scope and do not ask for internal IDs.

dependencies:
  tools:
    - type: "mcp"
      value: "sparklaunch_logo_generation"
      description: "SparkLaunch logo generation tools on MCP server"
      transport: "streamable_http"
      url: "https://sparklaun.ch/api/mcp/server/"

policy:
  allow_implicit_invocation: false
