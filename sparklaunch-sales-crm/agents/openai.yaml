interface:
  display_name: "SparkLaunch Sales"
  short_description: "Sales MCP operations"
  default_prompt: >
    Use $sparklaunch-sales against https://sparklaun.ch/api/mcp/server/.
    Authentication is API-key-first: use or request an MCP API key, and do not
    send login instructions when an API key path exists. If 401/403 occurs,
    validate token scope and session headers, reinitialize once if needed, and
    only present login_url as a fallback when key generation is unavailable.

dependencies:
  tools:
    - type: "mcp"
      value: "sparklaunch_sales"
      description: "SparkLaunch Sales MCP server"
      transport: "streamable_http"
      url: "https://sparklaun.ch/api/mcp/server/"

policy:
  allow_implicit_invocation: false
