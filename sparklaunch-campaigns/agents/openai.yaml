interface:
  display_name: "SparkLaunch Campaigns + QR"
  short_description: "Campaigns, shortlinks, QR, attribution"
  default_prompt: >
    Use $sparklaunch-campaigns against https://sparklaun.ch/api/mcp/.
    Authentication is API-key-first with a project-scoped MCP API key. If the user
    needs a new SparkLaunch project first, use the app or POST
    /api/mcp/auth/bootstrap/project with a site JWT before runtime MCP calls.
    On 401/403, verify key scope and MCP session headers first, then use login_url
    fallback only if key creation is blocked.

dependencies:
  tools:
    - type: "mcp"
      value: "sparklaunch_campaigns"
      description: "SparkLaunch Campaigns + QR tools on MCP runtime"
      transport: "streamable_http"
      url: "https://sparklaun.ch/api/mcp/"

policy:
  allow_implicit_invocation: false
