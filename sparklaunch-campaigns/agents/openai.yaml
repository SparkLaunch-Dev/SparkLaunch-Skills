interface:
  display_name: "SparkLaunch Campaigns MCP"
  short_description: "Operate Campaigns + QR/Shortlinks MCP safely"
  default_prompt: "Use $sparklaunch-campaigns against https://sparklaun.ch/api/mcp/campaigns/ and recover 401/403 by showing login_url, creating a fresh API key, then retrying."

dependencies:
  tools:
    - type: "mcp"
      value: "sparklaunch_campaigns_local"
      description: "SparkLaunch Campaigns + QR MCP server"
      transport: "streamable_http"
      url: "https://sparklaun.ch/api/mcp/campaigns/"

policy:
  allow_implicit_invocation: false
