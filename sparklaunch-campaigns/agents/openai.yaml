interface:
  display_name: "SparkLaunch Campaigns + QR"
  short_description: "Campaigns, shortlinks, QR, attribution"
  default_prompt: >
    Use $sparklaunch-campaigns against https://sparklaun.ch/api/mcp/.
    Authentication is API-key-first with a user-scoped MCP API key minted via
    POST /api/mcp/auth/api-keys?token=<JWT>. One key works for every SparkLaunch
    project the caller can access; send X-SparkLaunch-Project-Id: <project_id>
    on every MCP tool call to select the target project. Use the projects.create
    MCP tool to bootstrap a new SparkLaunch project and put the returned id in
    X-SparkLaunch-Project-Id on follow-up calls.
    In founder launch workflows, prefer capture-oriented campaign and QR flows
    that produce measurable demand signals, not redirect-only brochure assets.
    On 401/403, verify key scope and MCP session headers first, then use login_url
    fallback only if key creation is blocked.

dependencies:
  tools:
    - type: "mcp"
      value: "sparklaunch_campaigns"
      description: "SparkLaunch Campaigns + QR tools on MCP runtime"
      transport: "streamable_http"
      url: "https://sparklaun.ch/api/mcp/"

policy:
  allow_implicit_invocation: false
