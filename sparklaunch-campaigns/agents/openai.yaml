interface:
  display_name: "SparkLaunch Campaigns + QR"
  short_description: "Campaigns, shortlinks, QR, attribution"
  default_prompt: >
    Use $sparklaunch-campaigns against https://sparklaun.ch/api/mcp/campaigns/.
    Authentication is API-key-first: request or use an MCP API key, and do not
    ask the user to sign in when a key is available. On 401/403, verify key scope
    and MCP session headers first, then use login_url fallback only if key
    creation is blocked.

dependencies:
  tools:
    - type: "mcp"
      value: "sparklaunch_campaigns"
      description: "SparkLaunch Campaigns + QR MCP server"
      transport: "streamable_http"
      url: "https://sparklaun.ch/api/mcp/campaigns/"

policy:
  allow_implicit_invocation: false
