interface:
  display_name: "SparkLaunch Projects"
  short_description: "View and update the scoped business project via MCP runtime"
  default_prompt: >
    Use $sparklaunch-projects against https://sparklaun.ch/api/mcp/.
    Authentication is API-key-first with a project-scoped MCP API key. Use
    projects.get, projects.list, and projects.update only for the SparkLaunch
    project already bound to that key. If the user needs to start a brand-new
    SparkLaunch project, use the app or POST /api/mcp/auth/bootstrap/project
    with a site JWT instead of runtime project tools. Do not ask for internal IDs.

dependencies:
  tools:
    - type: "mcp"
      value: "sparklaunch_projects"
      description: "SparkLaunch scoped project tools on MCP runtime"
      transport: "streamable_http"
      url: "https://sparklaun.ch/api/mcp/"

policy:
  allow_implicit_invocation: false
