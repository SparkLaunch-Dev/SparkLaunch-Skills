interface:
  display_name: "SparkLaunch Projects"
  short_description: "View and update the scoped business project via MCP runtime"
  default_prompt: >
    Use $sparklaunch-projects against https://sparklaun.ch/api/mcp/.
    Authentication is API-key-first with a user-scoped MCP API key minted via
    POST /api/mcp/auth/api-keys?token=<JWT>. One key works for every SparkLaunch
    project the caller can access; send X-SparkLaunch-Project-Id: <project_id>
    on every MCP tool call to select the target project. Use projects.list to
    enumerate accessible projects, projects.get and projects.update against the
    project in the header, and projects.create to bootstrap a brand-new SparkLaunch
    project (then put the returned id in X-SparkLaunch-Project-Id on follow-up
    calls). Do not ask for internal IDs.

dependencies:
  tools:
    - type: "mcp"
      value: "sparklaunch_projects"
      description: "SparkLaunch scoped project tools on MCP runtime"
      transport: "streamable_http"
      url: "https://sparklaun.ch/api/mcp/"

policy:
  allow_implicit_invocation: false
