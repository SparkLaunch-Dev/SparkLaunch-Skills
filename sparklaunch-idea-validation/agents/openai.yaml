interface:
  display_name: "SparkLaunch Idea Validation"
  short_description: "Validate startup ideas via MCP runtime"
  default_prompt: >
    Use $sparklaunch-idea-validation against https://sparklaun.ch/api/mcp/.
    Authentication is API-key-first with a user-scoped MCP API key minted via
    POST /api/mcp/auth/api-keys?token=<JWT>. One key works for every SparkLaunch
    project the caller can access; send X-SparkLaunch-Project-Id: <project_id>
    on every MCP tool call to select the target project. Use the projects.create
    MCP tool to bootstrap a new SparkLaunch project and put the returned id in
    X-SparkLaunch-Project-Id on follow-up calls.
    Use validation.create_project and validation.start_analysis with validation.write
    scope to create and analyze validation workspaces inside the current SparkLaunch
    project, and validation.get_project or validation.list_projects with
    validation.read scope to view results. Do not ask for internal IDs.

dependencies:
  tools:
    - type: "mcp"
      value: "sparklaunch_idea_validation"
      description: "SparkLaunch idea validation tools on MCP runtime"
      transport: "streamable_http"
      url: "https://sparklaun.ch/api/mcp/"

policy:
  allow_implicit_invocation: false
